<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;Luma&quot;,&quot;short_name&quot;:&quot;Luma&quot;,&quot;description&quot;:&quot;Your personal journaling companion&quot;,&quot;start_url&quot;:&quot;https://www.lumajournal.com/&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23ffffff&quot;,&quot;theme_color&quot;:&quot;%237c3aed&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;https://www.lumajournal.com/favicon.ico&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/x-icon&quot;}]}">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <title>Luma</title>

    <!-- 👇 Preload theme before React loads -->
    <script>
      (function () {
        const mode = localStorage.getItem("luma-theme-mode") || "light";
        const scheme = localStorage.getItem("luma-color-scheme") || "purple";

        const shouldBeDark =
          mode === "dark" ||
          (mode === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);

        if (shouldBeDark) {
          document.documentElement.classList.add("dark");
        }

        document.documentElement.setAttribute("data-color-scheme", scheme);
      })();
    </script>
    <!-- 👆 Ensure dark mode and color scheme are applied before mount -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
